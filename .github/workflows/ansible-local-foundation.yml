name: Ansible Local Foundation Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - labs/configuration-management/ansible-local-foundation/**
      - labs/README.md
      - .github/workflows/ansible-local-foundation.yml
  workflow_dispatch:
    inputs:
      base_sha:
        description: Base commit SHA to compare against
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ansible-local-foundation:
    name: Ansible local foundation static validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve base and head commits
        id: commits
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request)
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              HEAD_SHA="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              BASE_SHA="${{ github.event.before }}"
              HEAD_SHA="${{ github.sha }}"
              [[ ! "$BASE_SHA" =~ ^0+$ ]] || { echo 'push base SHA is all zeroes'; exit 1; }
              ;;
            workflow_dispatch)
              BASE_SHA="${{ inputs.base_sha }}"
              HEAD_SHA="${{ github.sha }}"
              ;;
            *) echo 'unsupported event'; exit 1 ;;
          esac
          [[ "$BASE_SHA" =~ ^[0-9a-f]{40}$ && "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo 'invalid SHA format'; exit 1; }
          git cat-file -e "$BASE_SHA^{commit}"
          git cat-file -e "$HEAD_SHA^{commit}"
          git merge-base --is-ancestor "$BASE_SHA" "$HEAD_SHA"
          git diff --name-status --find-renames "$BASE_SHA" "$HEAD_SHA" | tee /tmp/ansible-local-foundation.diff
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Enforce approved changed paths and initial scaffold shape
        shell: bash
        run: |
          set -euo pipefail
          allowed='^(.github/workflows/ansible-local-foundation.yml|labs/README.md|labs/configuration-management/ansible-local-foundation/(README.md|ansible.cfg|.ansible-lint|requirements.in|requirements.lock|inventory/local.yml|playbooks/apply.yml|playbooks/cleanup.yml|roles/local_foundation/defaults/main.yml|roles/local_foundation/tasks/main.yml|roles/local_foundation/handlers/main.yml|roles/local_foundation/templates/config.json.j2|roles/local_foundation/templates/ecpel-ansible-local-foundation.service.j2|scripts/preflight-target.sh|tests/validate_structure.py|tests/validate_guardrails.py|evidence/README.md|tests/verify_state.py|tests/verify_cleanup.py|scripts/preflight-windows.ps1|scripts/create-target.ps1|scripts/run-local-validation.sh|scripts/destroy-target.ps1|evidence/manifest.md|evidence/validation-summary.md))$'
          awk '{print $2}' /tmp/ansible-local-foundation.diff | while read -r path; do [[ "$path" =~ $allowed ]] || { echo "unapproved path: $path"; exit 1; }; done
          if grep -qx 'A	.github/workflows/ansible-local-foundation.yml' /tmp/ansible-local-foundation.diff; then
            [[ "$(grep -c '^A	' /tmp/ansible-local-foundation.diff)" -eq 18 ]]
            grep -qx 'M	labs/README.md' /tmp/ansible-local-foundation.diff
            ! grep -qvE '^(A|M)	' /tmp/ansible-local-foundation.diff
          fi

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: '3.12'

      - name: Report Python and pip
        run: python -VV && python -m pip --version

      - name: Install locked dependencies
        working-directory: labs/configuration-management/ansible-local-foundation
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Validate installed dependencies
        run: |
          python -m pip check
          python - <<'PY'
          import importlib.metadata as md
          assert md.version('ansible-core') == '2.21.2'
          assert md.version('ansible-lint') == '26.6.0'
          PY

      - name: Run structure and guardrail tests
        working-directory: labs/configuration-management/ansible-local-foundation
        run: python tests/validate_structure.py && python tests/validate_guardrails.py

      - name: Validate Ansible inventory and syntax
        working-directory: labs/configuration-management/ansible-local-foundation
        run: |
          ansible-inventory -i inventory/local.yml --list
          ansible-playbook -i inventory/local.yml playbooks/apply.yml --limit ecpel_local_target --syntax-check
          ansible-playbook -i inventory/local.yml playbooks/cleanup.yml --limit ecpel_local_target --syntax-check

      - name: Run ansible-lint
        working-directory: labs/configuration-management/ansible-local-foundation
        run: ansible-lint playbooks/apply.yml playbooks/cleanup.yml roles/local_foundation

      - name: Validate shell syntax
        working-directory: labs/configuration-management/ansible-local-foundation
        run: bash -n scripts/preflight-target.sh

      - name: Validate Markdown and relative links
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          for p in [Path('labs/README.md'), Path('labs/configuration-management/ansible-local-foundation/README.md'), Path('labs/configuration-management/ansible-local-foundation/evidence/README.md')]:
              s=p.read_text(); assert s.startswith('# '), p; assert s.count('```') % 2 == 0, p
          assert Path('docs/adr/0008-adopt-ansible-for-initial-linux-configuration-management.md').exists()
          assert Path('labs/configuration-management/ansible-local-foundation/evidence/README.md').exists()
          PY

      - name: Scan changed scope for sensitive identifiers and generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          changed=$(awk '{print $2}' /tmp/ansible-local-foundation.diff)
          ! grep -Eni '(password[=:]|private[_ -]?key|token[=:]|BEGIN [A-Z ]*PRIVATE KEY|AKIA[0-9A-Z]{16})' $changed
          ! find labs/configuration-management/ansible-local-foundation -type f \( -name '*.retry' -o -name '*.pyc' -o -name '.coverage' \) | grep .
